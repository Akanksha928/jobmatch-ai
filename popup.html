<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <title>JobMatch AI</title>
</head>
<body>
  <div class="popup">

    <header class="header">
      <div class="logo-mark">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <circle cx="9" cy="9" r="8.5" stroke="#b5a8f5" stroke-width="1"/>
          <path d="M5 9.5 L7.5 12 L13 6.5" stroke="#7c6fe0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">JobMatch <em>AI</em></span>
    </header>

    <main class="main">
      <p class="tagline">Upload your resume once.<br>Match every job instantly.</p>

      <label class="upload-zone" id="upload-zone" for="resume-input">
        <div class="upload-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M12 15V3m0 0L8 7m4-4l4 4" stroke="#9b8fe8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 17v1a3 3 0 003 3h12a3 3 0 003-3v-1" stroke="#9b8fe8" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <span class="upload-label">Choose a file</span>
        <span class="upload-hint">PDF · TXT · DOCX</span>
        <input type="file" id="resume-input" accept=".pdf,.txt,.docx" />
      </label>

      <div class="status-area">
        <div class="status-pill" id="status-pill">
          <span class="status-dot" id="status-dot"></span>
          <span id="status">No resume uploaded yet.</span>
        </div>
        <button class="remove-btn" id="remove-resume" style="display:none;">
          <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
            <path d="M2 2l8 8M10 2l-8 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Remove
        </button>
      </div>
    </main>

    <footer class="footer">
      Open a LinkedIn job posting to see your match.
    </footer>

  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
